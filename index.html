<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>learnMe</title>
    <script>
      // Apply stored theme synchronously before first paint to prevent FOUC.
      // In mock/browser context the setting lives in localStorage under this key.
      try {
        var t = localStorage.getItem('mock_setting:theme')
        document.documentElement.dataset.theme = t === 'dark' ? 'dark' : 'light'
      } catch (e) {
        document.documentElement.dataset.theme = 'light'
      }
    </script>
  </head>
  <body>
    <div id="root">learnMe</div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
